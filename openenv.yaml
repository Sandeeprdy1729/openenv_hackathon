name: Ad Moderation Environment
description: >
  An OpenEnv-compliant environment for content moderation benchmarking.
  An LLM agent receives ad content with metadata and must decide to APPROVE, REJECT, or FLAG.
version: "1.0.0"
author: Team RL Meta

observation_space:
  type: text
  description: >
    Ad content with severity indicators, previous violations, and platform metadata.

action_space:
  type: discrete
  actions:
    - approve
    - reject
    - flag
  description: >
    Content moderation decision for the advertisement.

endpoints:
  health: /
  reset:  /reset
  step:   /step
  state:  /state

tasks:
  - id: spam_detection
    description: >
      Detect and remove spam advertisements.
    steps: 3
    ideal_action: reject

  - id: hate_speech_detection
    description: >
      Detect and remove hate speech content.
    steps: 3
    ideal_action: reject

  - id: misinformation_detection
    description: >
      Detect false or misleading claims.
    steps: 3
    ideal_action: reject

  - id: safe_content
    description: >
      Approve legitimate advertisements.
    steps: 3
    ideal_action: approve

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5
  score_formula: mean(step_rewards)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
