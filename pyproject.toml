[project]
name = "ad_integrity"
version = "1.0.0"
description = "Ad Moderation OpenEnv Benchmark"
requires-python = ">=3.9"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "openenv>=0.1.13",
    "openai",
    "python-dotenv",
]

[project.scripts]
server = "server.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.openenv]
name = "AdModeration"
version = "1.0.0"
tasks = [
    "spam_detection",
    "hate_speech_detection",
    "misinformation_detection",
    "safe_content"
]
entry_point = "server:app"
